services:
  postgres:
    image: postgres:16-alpine
    container_name: server-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./app
    container_name: server-monitor-web
    restart: unless-stopped
    command: gunicorn -w 2 -b 0.0.0.0:8000 --access-logfile - --error-logfile - "app.main:create_app()"
    environment:
      DATABASE_URL: postgresql://monitor:${POSTGRES_PASSWORD}@postgres:5432/monitor
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      RUN_MIGRATIONS: "1"
    volumes:
      - ./app/static:/srv/app/static:ro
      - ./app/templates:/srv/app/templates:ro
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: ./app
    container_name: server-monitor-scheduler
    restart: unless-stopped
    command: python -m app.scheduler
    # Bridge network (same as web), NOT host networking. Probes reach LAN
    # hosts through NAT on Linux, and Docker enables unprivileged ICMP
    # (net.ipv4.ping_group_range) inside every container namespace it
    # creates — so ICMP works without any host sysctl. Host networking
    # instead inherits the HOST's sysctls/firewall, which broke ICMP in the
    # field while the bridge-networked web container checked fine.
    # Note: on Docker Desktop (Mac/Win) LAN targets are unreachable from
    # containers either way — deploy on Linux for real monitoring.
    environment:
      DATABASE_URL: postgresql://monitor:${POSTGRES_PASSWORD}@postgres:5432/monitor
      APP_SECRET_KEY: ${APP_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: server-monitor-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8765}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  pg_data:
